name: Demo Verification

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Verify generated demo
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: "@attebury"
      - name: Verify template creation
        run: npm exec --yes --package=@attebury/topogram@0.2.35 -- topogram new "$RUNNER_TEMP/todo-from-template" --template @attebury/topogram-template-todo@0.1.6
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Check CLI command surface
        run: npm run cli:surface
      - name: Check catalog fixture
        run: npm run catalog:check
      - name: Check catalog template visibility
        run: npm run catalog:template-list
      - name: Check catalog template show
        run: npm run catalog:template-show
      - name: Check catalog template provenance
        run: npm run catalog:provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Check Topogram
        run: npm run check
      - name: Check template policy
        run: npm run template:policy:check
      - name: Check latest template status
        run: npm run template:status:latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify template update no-op
        run: npm run template:update:guard
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify template update conflict refusal
        run: npm run template:update:conflict
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Recommend template update action
        run: npm run template:update:recommend
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate app
        run: npm run generate
      - name: Verify app compile
        run: npm run verify
      - name: Write runtime CI env
        run: |
          cat > app/.env.ci <<'EOF'
          TOPOGRAM_ENVIRONMENT_PROFILE=local_process
          TOPOGRAM_DEPLOY_PROFILE=fly_io
          DB_PORT=5432
          SERVER_PORT=3000
          WEB_PORT=5173
          POSTGRES_DB=topogram_todo
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/topogram_todo
          DATABASE_ADMIN_URL=postgresql://postgres:postgres@localhost:5432/postgres
          PUBLIC_TOPOGRAM_API_BASE_URL=http://localhost:3000
          PUBLIC_TOPOGRAM_DEMO_USER_ID=11111111-1111-4111-8111-111111111111
          TOPOGRAM_DEMO_USER_ID=11111111-1111-4111-8111-111111111111
          TOPOGRAM_AUTH_PROFILE=bearer_demo
          TOPOGRAM_AUTH_TOKEN=topogram-todo-demo-token
          TOPOGRAM_AUTH_USER_ID=11111111-1111-4111-8111-111111111111
          TOPOGRAM_AUTH_PERMISSIONS=*
          TOPOGRAM_AUTH_ROLES=manager
          TOPOGRAM_AUTH_ADMIN=true
          PUBLIC_TOPOGRAM_AUTH_TOKEN=topogram-todo-demo-token
          PUBLIC_TOPOGRAM_AUTH_USER_ID=11111111-1111-4111-8111-111111111111
          PUBLIC_TOPOGRAM_AUTH_PERMISSIONS=*
          PUBLIC_TOPOGRAM_DEMO_PRIMARY_ID=33333333-3333-4333-8333-333333333333
          PUBLIC_TOPOGRAM_DEMO_CONTAINER_ID=22222222-2222-4222-8222-222222222222
          TOPOGRAM_DEMO_PRIMARY_ID=33333333-3333-4333-8333-333333333333
          TOPOGRAM_DEMO_CONTAINER_ID=22222222-2222-4222-8222-222222222222
          TOPOGRAM_SEED_DEMO=true
          TOPOGRAM_API_BASE_URL=http://localhost:3000
          TOPOGRAM_WEB_BASE_URL=http://localhost:5173
          EOF
      - name: Run generated runtime command
        run: npm run app:runtime
        env:
          TOPOGRAM_ENV_FILE: ${{ github.workspace }}/app/.env.ci
      - name: Assert app ports were released
        run: node ./scripts/verify-runtime-ports-free.mjs
